<html>
<head>
	<title>訂票頁面</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<header>
		<h1 onclick="goHome()">新影城訂票</h1>
		<nav>
		  <ul>
			<li><a href="index.html">影城介紹</a></li>
			<li><a href="index.html">電影資訊介紹</a></li>
			<li><a href="index.html">會員登入</a></li>
			<li><a href="index.html">影城介紹</a></li>
		  </ul>
		</nav>
	</header>

	<h2 class="page-title">電影訂票</h2>

	<main class="booking-container">

		<!-- 電影 -->
		<section class="booking-panel movie-select">
		  <h2>選擇電影</h2>
		  <select onchange="selectMovie(this.value)">
			<option value="">請選擇電影</option>
			<option value="藍色星期一">藍色星期一(Blue Monday)</option>
			<option value="綠色星期二">綠色星期二(Green Tuesday)</option>
			<option value="灰色星期三">灰色星期三(Gray Wednesday)</option>
			<option value="橙色星期四">橙色星期四(Orange Thursday)</option>
		  </select>
		</section>

		<!-- 日期 -->
		<section class="booking-panel date-select">
		  <h2>選擇日期</h2>
		  <div class="btn-group">
			<button class="option-btn" onclick="selectDate('2025年09月1日', event)">09/1</button>
			<button class="option-btn" onclick="selectDate('2025年09月2日', event)">09/2</button>
			<button class="option-btn" onclick="selectDate('2025年09月3日', event)">09/3</button>
			<button class="option-btn" onclick="selectDate('2025年09月4日', event)">09/4</button>
			<button class="option-btn" onclick="selectDate('2025年09月5日', event)">09/5</button>
		  </div>
		</section>

		<!-- 時間 -->
		<section class="booking-panel time-select">
		  <h2>選擇時間</h2>
		  <div class="btn-group">
			<button class="option-btn" onclick="selectTime('9:00', event)">9:00</button>
			<button class="option-btn" onclick="selectTime('12:30', event)">12:30</button>
			<button class="option-btn" onclick="selectTime('14:30', event)">14:30</button>
			<button class="option-btn" onclick="selectTime('17:00', event)">17:00</button>
			<button class="option-btn" onclick="selectTime('20:30', event)">20:30</button>
		  </div>
		</section>

		<!-- 影廳 -->
		<section class="booking-panel location-select">
		  <h2>選擇影廳</h2>
		  <div class="btn-group">
			<button class="option-btn" onclick="selectLocation('A廳', event)">A廳</button>
			<button class="option-btn" onclick="selectLocation('B廳', event)">B廳</button>
			<button class="option-btn" onclick="selectLocation('C廳', event)">C廳</button>
			<button class="option-btn" onclick="selectLocation('VIP廳', event)">VIP廳</button>
		  </div>
		</section>

		<!-- 訂票資訊 -->
		<section class="booking-summary">
		  <h2>訂票資訊</h2>
		  <p id="summaryText"></p>
		  <button class="primary-btn" onclick="confirmBooking()">確認訂票</button>
		</section>

	</main>

	<script src="script.js"></script>
</body>
</html>
